<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Live — Song Recognition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    :root {
      --bg-deep: #0a0a0f;
      --bg-card: #12121a;
      --bg-elevated: #1a1a24;
      --accent: #00ff9d;
      --accent-dim: #00c078;
      --text: #e8e8ed;
      --text-muted: #6b6b7b;
      --border: #2a2a38;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    main {
      position: relative; z-index: 1;
      max-width: 560px; margin: 0 auto; padding: 2rem;
      min-height: 100vh;
    }

    .landing-left, .landing-right { display: none; }
    body:not(.has-song) .landing-left,
    body:not(.has-song) .landing-right { display: block; }
    body:not(.has-song) main {
      display: flex;
      flex-direction: column;
    }
    body:not(.has-song) .mic-card {
      background: transparent !important;
      border: none !important;
    }
    body:not(.has-song) .landing-right {
      margin-top: 2rem;
    }
    body:not(.has-song) .now-playing { display: none; }
    body:not(.has-song) .results { display: none; }
    body.has-song .landing-left,
    body.has-song .landing-right { display: none; }

    header { text-align: center; margin-bottom: 3rem; }

    h1 {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { margin-top: 0.5rem; font-size: 0.95rem; color: var(--text-muted); }

    /* ── Mic card (idle) ── */
    .mic-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem; text-align: center;
      margin-bottom: 1.25rem;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  top 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.3s ease, border-radius 0.4s ease;
    }

    .mic-btn {
      width: 140px; height: 140px; border-radius: 50%;
      border: none; background: var(--bg-elevated);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    .mic-btn:hover:not(:disabled) {
      background: rgba(0,255,157,0.2) !important;
      transform: scale(1.12) !important;
      box-shadow: 0 0 36px rgba(0,255,157,0.5), 0 0 72px rgba(0,255,157,0.2) !important;
    }
    .mic-btn.listening { border: none; background: rgba(0,255,157,0.15); animation: pulse-ring 1.5s ease-out infinite; }
    .mic-btn.identifying { border: none; background: rgba(255,184,0,0.15); animation: none; }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(0,255,157,0.4); }
      70% { box-shadow: 0 0 0 18px rgba(0,255,157,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,255,157,0); }
    }

    .mic-icon { width: 56px; height: 56px; fill: var(--text-muted); transition: fill 0.3s; }
    .mic-btn:hover .mic-icon, .mic-btn.listening .mic-icon { fill: var(--accent); }
    .mic-btn.identifying .mic-icon { fill: #ffb800; }

    .status-text { font-size: 1rem; color: var(--text-muted); }
    body:not(.has-song) .status-text { font-size: 1.5rem; font-weight: 500; }
    .status-text.listening { color: var(--accent); font-weight: 500; }
    .status-subtext { margin-top: 0.3rem; min-height: 1.1rem; font-size: 0.84rem; color: var(--text-muted); }

    /* ── Spotify card (when music source) ── */
    .spotify-card { display: none; }
    body.spotify-mode .spotify-card { display: block; }
    body.spotify-mode .mic-card { display: none !important; }
    .spotify-status-msg { font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-top: 0.5rem; }
    .spotify-status-msg.active { color: var(--accent); font-weight: 500; }

    /* ── Now Playing (base / hidden) ── */
    .now-playing {
      background: var(--bg-card); border: 1px solid var(--accent-dim);
      border-radius: 16px; padding: 1.5rem 1.75rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .now-playing.visible { display: block; }
    .now-playing.paused { border-color: #ffb800; }

    .np-header {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.6rem;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .np-badge {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      font-weight: 600; color: var(--accent);
    }
    .now-playing.paused .np-badge { color: #ffb800; }

    .np-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.9rem; }

    .np-art {
      width: 56px; height: 56px; border-radius: 8px;
      background: var(--bg-elevated); object-fit: cover; flex-shrink: 0;
    }

    .np-info { flex: 1; min-width: 0; }
    .np-title { font-weight: 600; font-size: 1.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-artist { color: var(--text-muted); font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .np-bar-wrap { width: 100%; }
    .np-bar {
      width: 100%; height: 8px; border-radius: 999px;
      background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .np-bar-fill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dim));
      transition: width 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .now-playing.paused .np-bar-fill { background: linear-gradient(90deg, #ffb800, #cc9200); }

    .np-times {
      display: flex; justify-content: space-between; margin-top: 0.35rem;
      font-size: 0.75rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .np-links { display: flex; gap: 0.6rem; margin-top: 0.6rem; justify-content: center; }
    .np-links a { font-size: 0.78rem; color: var(--accent); text-decoration: none; }
    .np-links a:hover { text-decoration: underline; }

    .social-posts-ticker {
      display: none;
      position: fixed; top: 6rem; left: 1.5rem; z-index: 90;
      max-width: 480px; width: calc(100vw - 3rem);
      background: #1a1a1b; border: 1px solid #343536;
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .social-posts-ticker.visible { display: block; }
    .social-posts-ticker .sp-reddit-card {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .social-posts-ticker.sp-visible .sp-reddit-card {
      opacity: 1;
      transform: translateY(0);
    }
    .social-posts-ticker .sp-reddit-card {
      display: flex; padding: 1.25rem 1.5rem; gap: 0.75rem;
      text-decoration: none; color: #d7dadc; transition: background 0.2s;
    }
    .social-posts-ticker .sp-reddit-card:hover { background: #272729; }
    .social-posts-ticker .sp-votes {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      color: #8e8e93; font-size: 0.9rem; font-weight: 600;
    }
    .social-posts-ticker .sp-vote-icon {
      width: 28px; height: 28px; color: #ff4500; margin: -2px 0;
    }
    .social-posts-ticker .sp-body { flex: 1; min-width: 0; }
    .social-posts-ticker .sp-meta {
      font-size: 0.9rem; color: #818384; margin-bottom: 0.4rem;
    }
    .social-posts-ticker .sp-meta .sp-sub { color: #ff4500; font-weight: 600; }
    .social-posts-ticker .sp-title { font-size: 1.12rem; line-height: 1.35; color: #d7dadc; }
    .social-posts-ticker .sp-footer { font-size: 0.82rem; color: #818384; margin-top: 0.5rem; }
    .social-posts-loading { font-size: 0.95rem; color: var(--text-muted); padding: 1.25rem 1.5rem; }

    /* ── Lyrics ── */
    .lyrics-box {
      margin-top: 1rem; padding: 0.75rem 0;
      max-height: 160px; overflow: hidden;
      position: relative;
      display: none;
    }
    .lyrics-box.visible { display: block; }

    .lyrics-box::before, .lyrics-box::after {
      content: ''; position: absolute; left: 0; right: 0; height: 3.5rem; z-index: 1; pointer-events: none;
    }
    .lyrics-box::before { top: 0; background: linear-gradient(var(--bg-deep), transparent); }
    .lyrics-box::after { bottom: 0; background: linear-gradient(transparent, var(--bg-deep)); }

    .lyrics-links { display: none; }
    .lyrics-links a { color: #1DB954; text-decoration: none; }
    .lyrics-links a:hover { text-decoration: underline; }

    .lyrics-inner {
      padding: 3rem 0;
    }

    .lyrics-line {
      font-size: 1.2rem; line-height: 1.8; min-height: 1.8em;
      color: var(--text-muted);
      text-align: center;
      padding: 0.15rem 0;
    }
    .lyrics-line.active {
      color: var(--text);
      font-weight: 600;
    }
    .lyrics-line.past { opacity: 0.3; }

    /* ── History ── */
    .results { margin-top: 2rem; }
    .last-song-section {
      display: none;
      margin-bottom: 1.5rem;
    }
    .last-song-section.visible { display: block; }
    .last-song-label {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); margin-bottom: 0.75rem; font-weight: 600;
    }
    .last-song-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      gap: 1rem;
    }
    .last-song-main {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      align-items: center; gap: 1.25rem 2rem; width: 100%;
    }
    .last-song-art-col {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      min-width: 0;
    }
    .last-song-card .album-art {
      width: 120px; height: 120px; border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .last-song-title-col {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-width: 0;
    }
    .last-song-card .result-info {
      text-align: center; min-width: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.2rem;
    }
    .last-song-card .result-title { font-size: 1.2rem; margin-bottom: 0.2rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .last-song-card .result-artist { font-size: 0.95rem; color: var(--text-muted); }
    .last-song-card .result-meta { margin-top: 0.25rem; font-size: 0.8rem; color: var(--text-muted); }
    .last-song-video-col {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-width: 0; gap: 0.75rem;
      padding-left: 0.5rem;
    }
    .last-song-title-col { padding-right: 0.5rem; }
    .last-song-tidbit {
      font-size: 0.85rem; color: var(--text-muted);
      font-style: italic; line-height: 1.35; text-align: center;
      padding-top: 0.5rem; border-top: 1px solid var(--border);
    }
    .last-song-video-thumb {
      width: 100%; aspect-ratio: 16 / 9; border-radius: 8px;
      overflow: hidden; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .last-song-video-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .last-song-video-thumb .video-play-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); color: #fff;
    }
    .last-song-video-thumb .video-play-icon svg { width: 32px; height: 32px; }
    .last-song-video-thumb:hover .video-play-icon { background: rgba(0,0,0,0.2); }
    .last-song-video-thumb.no-thumb .video-play-icon { background: var(--bg-elevated); color: var(--accent); }
    .last-song-video-meta { text-align: center; max-width: 100%; min-width: 0; }
    .last-song-video-title { font-size: 0.8rem; color: var(--text-muted); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .last-song-video-channel { font-size: 0.72rem; color: var(--text-muted); opacity: 0.9; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .last-song-links {
      display: flex; justify-content: center; gap: 0.5rem;
    }
    .last-song-links a { display: flex; align-items: center; padding: 0.25rem; border-radius: 6px; }
    .last-song-links a:hover { background: rgba(255,255,255,0.08); }
    .last-song-links .result-link-icon { padding: 0.2rem; }
    .last-song-links svg { width: 22px; height: 22px; }
    .history-label {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); margin-bottom: 0.75rem; font-weight: 600;
    }

    #resultsList, #resultsListDrawer {
      display: grid;
      grid-template-columns: 48px 1fr 1fr 1fr;
      align-items: center; gap: 0.75rem 1.75rem;
    }
    .result-col-empty { display: block; min-height: 1px; }
    .result-card {
      display: grid;
      grid-template-columns: subgrid;
      grid-column: 1 / -1;
      align-items: center;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem 1.5rem;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
    }
    .album-art {
      width: 48px; height: 48px; border-radius: 6px;
      background: var(--bg-elevated); object-fit: cover; flex-shrink: 0;
    }
    .result-info {
      min-width: 0; padding-left: 1rem;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .result-title {
      font-weight: 600; font-size: 0.95rem;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .result-artist { color: var(--text-muted); font-size: 0.85rem; }
    .result-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-muted); }
    .result-links { display: flex; gap: 0.5rem; margin-top: 0.35rem; }
    .result-links a { font-size: 0.75rem; color: var(--accent); text-decoration: none; }
    .result-links a:hover { text-decoration: underline; }
    .result-col-video { display: flex; justify-content: flex-start; min-width: 0; overflow: hidden; }
    .result-col-icons { display: flex; justify-content: flex-end; min-width: 0; gap: 0.25rem; }
    .result-col-icons a { display: flex; align-items: center; padding: 0.25rem; border-radius: 6px; }
    .result-col-icons a:hover { background: rgba(255,255,255,0.08); }
    .result-col-icons svg { width: 22px; height: 22px; }
    .result-video-block {
      display: flex; align-items: center; justify-content: flex-start;
      text-decoration: none; color: inherit; min-width: 0; flex: 1; overflow: hidden;
    }
    .result-video-block:hover { color: inherit; }
    .result-video-row {
      display: flex; align-items: center; gap: 0.4rem; min-width: 0; overflow: hidden; flex: 1;
    }
    .result-video-thumb {
      display: flex; align-items: center; justify-content: center;
      width: 56px; height: 36px; border-radius: 6px;
      overflow: hidden; position: relative;
      flex-shrink: 0;
    }
    .result-video-thumb .video-thumb-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .result-video-thumb .video-play-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4);
      color: #fff;
    }
    .result-video-thumb .video-play-icon svg { width: 20px; height: 20px; }
    .result-video-thumb:hover .video-play-icon { background: rgba(0,0,0,0.2); }
    .result-video-thumb.no-thumb .video-play-icon { background: var(--bg-elevated); color: var(--accent); }
    .result-video-meta {
      display: flex; flex-direction: column; justify-content: center;
      gap: 0.1rem; min-width: 0; flex: 1;
    }
    .result-video-title {
      font-size: 0.72rem; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .result-video-channel {
      font-size: 0.68rem; color: var(--text-muted);
      opacity: 0.85; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    .error-msg {
      background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3);
      color: #ff6b6b; padding: 1.25rem 1.5rem; border-radius: 8px;
      margin-bottom: 1rem; font-size: 0.9rem;
    }

    /* ── History toggle + drawer overlay ── */
    .history-toggle {
      display: none;
      position: fixed; bottom: 3.5rem; right: 1.5rem;
      z-index: 150;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(18,18,26,0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      cursor: pointer;
      align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: all 0.25s ease;
    }
    .history-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .history-toggle svg { width: 22px; height: 22px; fill: currentColor; }
    .history-toggle .badge {
      position: absolute; top: -4px; right: -4px;
      min-width: 20px; height: 20px;
      background: var(--accent); color: var(--bg-deep);
      border-radius: 999px; font-size: 0.68rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }
    .history-toggle .badge:empty { display: none; }

    .drawer-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 180;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .drawer-overlay.visible { display: block; opacity: 1; }

    /* ── Settings gear + modal ── */
    .settings-btn {
      position: fixed; top: 1.35rem; left: 1.5rem;
      z-index: 105;
      width: 36px; height: 36px;
      border: 1px solid var(--border); border-radius: 50%;
      background: rgba(18,18,26,0.7);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.25s ease;
    }
    .settings-btn:hover { border-color: var(--accent); color: var(--accent); }
    .settings-btn svg { width: 18px; height: 18px; fill: currentColor; }
    body.has-song .settings-btn { top: 1.35rem; left: 1.5rem; }

    .settings-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .settings-overlay.visible { display: flex; opacity: 1; }

    .settings-modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
      width: min(540px, 92vw); max-height: 85vh; overflow-y: auto;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .settings-modal h2 {
      font-size: 1.15rem; font-weight: 600; margin-bottom: 1.25rem;
      color: var(--text);
    }

    .stg-group { margin-bottom: 1.25rem; }
    .stg-label {
      display: block; font-size: 0.78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 0.5rem;
    }
    .stg-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .stg-radio {
      flex: 1; padding: 0.6rem 0.8rem; white-space: nowrap;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-elevated); color: var(--text-muted);
      cursor: pointer; text-align: center; font-size: 0.88rem;
      font-weight: 500; transition: all 0.2s ease;
      font-family: inherit;
    }
    .stg-radio:hover { border-color: var(--accent); color: var(--text); }
    .stg-radio.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(0,255,157,0.08);
    }
    .stg-input {
      width: 100%; padding: 0.55rem 0.75rem;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-elevated); color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      margin-bottom: 0.4rem; outline: none; transition: border-color 0.2s;
    }
    .stg-input:focus { border-color: var(--accent); }
    .stg-input::placeholder { color: var(--text-muted); opacity: 0.6; }
    .stg-hint {
      font-size: 0.72rem; color: var(--text-muted); line-height: 1.4;
      margin-top: 0.15rem;
    }
    .stg-hint a { color: var(--accent); text-decoration: none; }
    .stg-hint a:hover { text-decoration: underline; }
    .stg-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .stg-usage {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem; color: var(--text);
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.6rem 0.85rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .stg-usage-bar {
      flex: 1; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .stg-usage-fill {
      height: 100%; border-radius: 3px;
      background: var(--accent); transition: width 0.3s ease;
    }
    .stg-usage-fill.warn { background: #ffb800; }
    .stg-usage-fill.crit { background: #ff5050; }
    .stg-usage-text { font-size: 0.75rem; white-space: nowrap; color: var(--text-muted); }

    .stg-fields { display: none; }
    .stg-fields.visible { display: block; }

    .stg-actions { display: flex; gap: 0.6rem; margin-top: 1.5rem; }
    .stg-save, .stg-cancel {
      flex: 1; padding: 0.6rem; border-radius: 8px; font-size: 0.88rem;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.2s ease; border: 1px solid transparent;
    }
    .stg-save {
      background: var(--accent); color: var(--bg-deep); border-color: var(--accent);
    }
    .stg-save:hover { background: var(--accent-dim); }
    .stg-cancel {
      background: transparent; color: var(--text-muted); border-color: var(--border);
    }
    .stg-cancel:hover { border-color: var(--text-muted); color: var(--text); }

    .stg-status {
      margin-top: 0.75rem; font-size: 0.78rem; text-align: center;
      min-height: 1.2rem;
    }
    .stg-status.ok { color: var(--accent); }
    .stg-status.err { color: #ff6b6b; }

    /* Move brand right when settings button present */
    .fs-brand { left: 4.5rem !important; }

    /* ── Video badge (Official Music Video) ── */
    .video-badge {
      display: none;
      position: fixed; top: 0.8rem; left: 50%;
      transform: translateX(-50%);
      z-index: 55;
      color: #fff;
      background: rgba(10,10,15,0.55);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 0.45rem 1.2rem;
      pointer-events: none;
      flex-direction: row; align-items: center; gap: 0.6rem;
      max-width: 55vw; white-space: nowrap;
      overflow: hidden;
      transition: max-width 0.6s ease-in-out, padding 0.6s ease-in-out,
                  opacity 0.4s ease, transform 0.5s ease;
    }
    .video-badge.compact {
      max-width: 280px; padding: 0.28rem 0.75rem;
    }
    .video-badge.compact .vb-title,
    .video-badge.compact .vb-channel,
    .video-badge.compact .vb-sep,
    .video-badge.compact .vb-tag { font-size: 0.76rem !important; }
    .video-badge.compact .vb-platform svg { width: 12px; height: 12px; }
    .video-badge.visible { display: flex; }

    .video-badge .vb-tag {
      display: flex; align-items: center; gap: 0.25rem;
      font-size: 0.92rem; font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-muted); flex-shrink: 0;
    }
    .video-badge.official .vb-tag { color: #ff5070; }
    .video-badge.searching .vb-tag { color: var(--accent); }
    .video-badge .vb-icon { width: 10px; height: 10px; flex-shrink: 0; }

    .video-badge .vb-search {
      font-size: 0.72rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      text-align: center; line-height: 1.5;
    }
    .video-badge .vb-search .pass { opacity: 0.4; }
    .video-badge .vb-search .active { color: var(--accent); }
    .video-badge .vb-search .fail { color: #ff6b6b; opacity: 0.6; }
    .video-badge.searching {
      flex-direction: column; align-items: center; gap: 0.15rem;
      border-radius: 12px; max-width: 50vw; white-space: normal;
    }

    .video-badge .vb-marquee {
      overflow: hidden; flex: 1; min-width: 0;
    }
    .video-badge .vb-marquee-inner {
      display: inline-flex; align-items: center;
      animation: vbScroll 20s linear infinite;
    }
    .video-badge .vb-seg {
      display: inline-flex; align-items: center; gap: 0.5rem;
      flex-shrink: 0;
    }
    .video-badge .vb-gap { display: inline-block; width: 0.5rem; flex-shrink: 0; }
    .video-badge .vb-marquee-inner:hover { animation-play-state: paused; }
    @keyframes vbScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .video-badge .vb-title {
      font-size: 0.95rem; font-weight: 500; color: var(--text);
      white-space: nowrap;
    }
    .video-badge .vb-sep {
      color: var(--text-muted); opacity: 0.35; font-size: 0.95rem;
    }
    .video-badge .vb-channel {
      font-size: 0.95rem; color: var(--text-muted);
      white-space: nowrap;
    }
    .video-badge .vb-platform {
      display: inline-flex; align-items: center; gap: 0.2rem;
      flex-shrink: 0; font-size: 0.95rem;
    }
    .video-badge .vb-platform svg { width: 16px; height: 16px; }

    .search-debug {
      display: none;
      position: fixed; top: 4.5rem; right: 1.5rem; z-index: 100;
      max-width: 90vw; max-height: 40vh; overflow-y: auto;
      background: rgba(0,0,0,0.85); border: 1px solid var(--accent);
      border-radius: 8px; padding: 0.75rem 1rem;
      font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;
      color: var(--accent); line-height: 1.6; white-space: pre-wrap;
    }
    .search-debug.debug-visible { display: block; }

    .stg-check {
      display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none;
    }
    .stg-check input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

    @media (min-width: 700px) {
      .video-badge { padding: 0.5rem 1.4rem; }
    }
    @media (min-width: 1200px) {
      .video-badge { padding: 0.55rem 1.6rem; }
    }

    /* ── Video background ── */
    .video-bg {
      position: fixed; inset: 0; z-index: 40;
      overflow: hidden; background: #000;
      display: none;
      opacity: 0;
      transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.has-video .video-bg { display: block; }
    body.has-video.video-ready .video-bg { opacity: 1; }
    body.has-video.video-paused .video-bg,
    body.video-paused .video-bg,
    .video-bg.video-paused { opacity: 0 !important; transition: opacity 0.3s ease; }

    .video-bg iframe {
      position: absolute !important; top: 50% !important; left: 50% !important;
      width: 177.78vh !important; height: 100vh !important;
      min-width: 100vw !important; min-height: 56.25vw !important;
      transform: translate(-50%, -50%) !important;
      pointer-events: none; border: none !important;
      opacity: 1;
      object-fit: cover;
    }

    /* Hide Dailymotion watermark overlay area at bottom */
    .video-bg::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px; z-index: 2; pointer-events: none;
      background: linear-gradient(transparent, rgba(10,10,15,0.8));
    }

    .video-bg::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,15,0.55);
      z-index: 1;
    }

    .video-bg canvas {
      position: absolute; inset: 0;
      width: 100% !important; height: 100% !important; display: block;
    }

    body.has-video.video-ready .bg-grid { display: none; }
    body.has-video main { z-index: 45; }
    body.has-video .fs-brand { opacity: 0.35; }
    body.has-video .mic-card { background: rgba(10,10,15,0.55) !important; }

    /* ── Video-mode: push content to edges so video is visible ── */
    body.has-video.has-song .now-playing {
      background: transparent !important;
      flex-direction: row !important;
      align-items: flex-end !important;
      justify-content: space-between !important;
      padding: 0 !important;
      overflow: visible !important;
    }

    /* Left column: art + info + bar at bottom-left */
    body.has-video.has-song .np-header {
      position: fixed; top: 0.8rem; right: 1.5rem; left: auto; bottom: auto;
      transform: none;
      margin: 0; z-index: 52;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    body.has-video.has-song .np-header.np-hidden {
      opacity: 0; transform: translateX(1rem); pointer-events: none;
    }
    body.has-video.has-song .np-badge {
      text-shadow: 0 1px 10px rgba(0,0,0,0.8);
      background: rgba(10,10,15,0.55);
      padding: 0.35rem 1rem; border-radius: 999px;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      font-size: 0.75rem;
    }

    body.has-video.has-song .np-row {
      position: fixed; bottom: 3.5rem; left: 1.5rem;
      flex-direction: row !important; align-items: flex-end !important;
      text-align: left !important; gap: 1rem !important;
      margin: 0 !important;
      max-width: 50vw;
    }
    body.has-video.has-song .np-art {
      width: 80px !important; height: 80px !important;
      border-radius: 12px !important; flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.1) !important;
    }
    body.has-video.has-song .np-info { text-align: left !important; }
    body.has-video.has-song .np-title {
      font-size: 1.15rem !important; line-height: 1.3 !important;
      text-shadow: 0 2px 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.5);
    }
    body.has-video.has-song .np-artist {
      font-size: 0.9rem !important;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    body.has-video.has-song .np-bar-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 100% !important; padding: 0 1.5rem 0.6rem;
    }
    body.has-video.has-song .np-bar {
      height: 4px !important; border-radius: 0 0 0 0;
      background: rgba(255,255,255,0.12) !important;
    }
    body.has-video.has-song .np-times {
      text-shadow: 0 1px 8px rgba(0,0,0,0.7);
      font-size: 0.72rem !important;
    }

    body.has-video.has-song .np-links {
      position: fixed; bottom: 1.5rem; left: 1.5rem;
      margin: 0; transform: translateY(calc(-80px - 1.5rem));
      display: none;
    }

    /* Right column: lyrics pinned to right side */
    body.has-video.has-song .lyrics-box {
      position: fixed !important; right: 1.5rem; top: 50%;
      transform: translateY(-50%);
      max-height: 60vh !important; width: 320px !important;
      max-width: 35vw !important;
      margin: 0 !important;
      background: rgba(10,10,15,0.3);
      border-radius: 16px;
      padding: 1rem 0.5rem !important;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    body.has-video.has-song .lyrics-box::before {
      background: linear-gradient(rgba(10,10,15,0.4), transparent) !important;
      border-radius: 16px 16px 0 0;
    }
    body.has-video.has-song .lyrics-box::after {
      background: linear-gradient(transparent, rgba(10,10,15,0.4)) !important;
      border-radius: 0 0 16px 16px;
    }
    body.has-video.has-song .lyrics-line {
      font-size: 0.95rem !important; line-height: 1.9 !important;
      text-shadow: 0 1px 10px rgba(0,0,0,0.6);
    }
    body.has-video.has-song .lyrics-line.active {
      font-size: 1.15rem !important;
      text-shadow: 0 2px 16px rgba(0,0,0,0.8);
    }

    /* ═══════════════════════════════════════════════
       FULL-SCREEN MODE  (body.has-song)
       ═══════════════════════════════════════════════ */
    body.has-song { overflow: hidden; }

    body.has-song main {
      max-width: 100%; padding: 0; margin: 0;
    }

    body.has-song header { display: none; }

    /* Mic → floating pill */
    body.has-song .mic-card {
      position: fixed; top: 1.25rem; right: 1.25rem;
      z-index: 100; margin: 0;
      background: rgba(18,18,26,0.8);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 999px;
      padding: 0.35rem 1rem 0.35rem 0.35rem;
      display: flex; align-items: center; gap: 0.6rem;
      text-align: left;
    }
    body.has-song .mic-btn {
      width: 42px; height: 42px; margin: 0; flex-shrink: 0;
    }
    body.has-song .mic-icon { width: 18px; height: 18px; }
    body.has-song .status-text { font-size: 0.82rem; }
    body.has-song .status-subtext { display: none; }

    /* Now Playing → fullscreen */
    body.has-song .now-playing {
      position: fixed; inset: 0; z-index: 50;
      border: none; border-radius: 0;
      background: var(--bg-deep);
      margin: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4.5rem 1.5rem 2rem;
      overflow-y: auto;
    }
    body.has-song .now-playing.visible { display: flex; }
    body.has-song .now-playing.paused { border: none; }

    body.has-song .np-header { margin-bottom: 1.5rem; }
    body.has-song .np-badge { font-size: 0.82rem; letter-spacing: 0.14em; }

    body.has-song .np-row {
      flex-direction: column; align-items: center;
      text-align: center; gap: 1.25rem; margin-bottom: 1.5rem;
    }
    body.has-song .np-art {
      width: 160px; height: 160px; border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    body.has-song .np-info { text-align: center; }
    body.has-song .np-title {
      font-size: 1.5rem; white-space: normal;
      overflow: visible; text-overflow: unset;
      line-height: 1.3;
    }
    body.has-song .np-artist {
      font-size: 1rem; margin-top: 0.25rem;
      white-space: normal;
    }

    body.has-song .np-bar-wrap { max-width: 440px; }
    body.has-song .np-bar { height: 10px; }
    body.has-song .np-times { font-size: 0.82rem; margin-top: 0.4rem; }

    body.has-song .np-links { margin-top: 0.8rem; gap: 1rem; }
    body.has-song .np-links a { font-size: 0.88rem; }

    body.has-song .lyrics-box {
      max-height: 35vh; margin-top: 1.5rem;
      max-width: 600px; width: 100%;
      flex-shrink: 0;
    }
    body.has-song .lyrics-line { font-size: 1.15rem; line-height: 2; }
    body.has-song .lyrics-line.active { font-size: 1.4rem; }

    /* History → slide-in drawer */
    body.has-song .results {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: min(520px, 92vw);
      z-index: 200; margin: 0;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
      overflow-x: hidden;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.has-song .results.drawer-open { transform: translateX(0); }
    body.has-song .results .result-title {
      -webkit-line-clamp: unset; white-space: normal; word-break: break-word;
    }
    body.has-song .results::-webkit-scrollbar { width: 6px; }
    body.has-song .results::-webkit-scrollbar-track { background: transparent; }
    body.has-song .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    body.has-song .history-toggle { display: flex; }

    body.has-song #errorArea {
      position: fixed; top: 4.5rem; left: 1rem; right: 1rem;
      z-index: 110;
    }

    /* DJ Live watermark */
    .fs-brand {
      display: none;
      position: fixed; top: 1.35rem; left: 1.5rem;
      z-index: 100;
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.6;
    }
    body.has-song .fs-brand { display: block; }

    /* ── Larger screens (700px+) ── */
    @media (min-width: 700px) {
      body.has-song .now-playing { padding: 5rem 2rem 4rem; }

      body.has-song .np-art { width: 200px; height: 200px; border-radius: 20px; }
      body.has-song .np-title { font-size: 2.2rem; }
      body.has-song .np-artist { font-size: 1.2rem; }
      body.has-song .np-badge { font-size: 0.9rem; }

      body.has-song .np-bar-wrap { max-width: 520px; }
      body.has-song .np-bar { height: 12px; }
      body.has-song .np-times { font-size: 0.88rem; }
      body.has-song .np-links a { font-size: 0.95rem; }

      body.has-song .lyrics-box { max-height: 38vh; max-width: 700px; }
      body.has-song .lyrics-line { font-size: 1.3rem; line-height: 2.1; }
      body.has-song .lyrics-line.active { font-size: 1.65rem; }

      body.has-song .mic-card {
        padding: 0.45rem 1.25rem 0.45rem 0.45rem; gap: 0.75rem;
      }
      body.has-song .mic-btn { width: 48px; height: 48px; }
      body.has-song .mic-icon { width: 20px; height: 20px; }
      body.has-song .status-text { font-size: 0.9rem; }

      body.has-song .fs-brand { font-size: 1.3rem; }

      /* Video mode: scale up for medium screens */
      body.has-video.has-song .np-row { bottom: 4rem; left: 2rem; }
      body.has-video.has-song .np-art { width: 100px !important; height: 100px !important; }
      body.has-video.has-song .np-title { font-size: 1.4rem !important; }
      body.has-video.has-song .np-artist { font-size: 1rem !important; }
      body.has-video.has-song .lyrics-box {
        width: 380px !important; max-width: 30vw !important;
        right: 2rem;
      }
      body.has-video.has-song .lyrics-line { font-size: 1.1rem !important; }
      body.has-video.has-song .lyrics-line.active { font-size: 1.35rem !important; }

      body.has-song .now-playing { padding: 5rem 3rem 4rem; }

      body.has-song .np-art {
        width: 240px; height: 240px;
        box-shadow: 0 32px 100px rgba(0,0,0,0.6), 0 0 120px rgba(0,255,157,0.06);
      }
      body.has-song .np-title { font-size: 2.8rem; }
      body.has-song .np-artist { font-size: 1.4rem; }
      body.has-song .np-badge { font-size: 1rem; letter-spacing: 0.16em; }

      body.has-song .np-bar-wrap { max-width: 600px; }
      body.has-song .np-bar { height: 14px; }
      body.has-song .np-times { font-size: 0.92rem; }
      body.has-song .np-links a { font-size: 1rem; }

      body.has-song .lyrics-line { font-size: 1.5rem; line-height: 2.2; }
      body.has-song .lyrics-line.active { font-size: 1.9rem; }

      body.has-song .fs-brand { font-size: 1.5rem; left: 2rem; top: 1.5rem; }

      body.has-video.has-song .np-row {
        bottom: 4.5rem; left: 2.5rem;

      }
      body.has-video.has-song .np-art {
        width: 120px !important; height: 120px !important;
        border-radius: 14px !important;
      }
      body.has-video.has-song .np-title { font-size: 1.7rem !important; }
      body.has-video.has-song .np-artist { font-size: 1.15rem !important; }
      body.has-video.has-song .np-bar-wrap { padding: 0 2.5rem 0.8rem; }
      body.has-video.has-song .np-bar { height: 5px !important; }
      body.has-video.has-song .np-times { font-size: 0.78rem !important; }
      body.has-video.has-song .lyrics-box {
        width: 420px !important; max-width: 28vw !important;
        right: 2.5rem; max-height: 65vh !important;
      }
      body.has-video.has-song .lyrics-line { font-size: 1.25rem !important; line-height: 2 !important; }
      body.has-video.has-song .lyrics-line.active { font-size: 1.55rem !important; }
    }

    /* ── TV / Large screens: two-column landing, full height ── */
    @media (min-width: 1280px) {
      body:not(.has-song) main {
        max-width: none;
        width: 100%;
        height: 100vh;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr;

        text-align: center;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      body:not(.has-song) .landing-left h1 {
        font-size: 2.8rem;

  <script>
    let ytApiReady = false;
    window.onYouTubeIframeAPIReady = () => { ytApiReady = true; console.log('[YT] IFrame API ready'); };

    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const statusSubtext = document.getElementById('statusSubtext');
    const errorArea = document.getElementById('errorArea');
    const resultsList = document.getElementById('resultsList');

      npBadge.textContent = text;

      npBadgeTimer = setTimeout(() => npHeader.classList.add('np-hidden'), 5000);
    }
    const npArt = document.getElementById('npArt');
    const npTitle = document.getElementById('npTitle');
    const npArtist = document.getElementById('npArtist');
    const npFill = document.getElementById('npFill');
    const npElapsed = document.getElementById('npElapsed');
    const npRemaining = document.getElementById('npRemaining');
    const npLinks = document.getElementById('npLinks');
    const resultsDrawer = document.getElementById('resultsDrawer');
    const resultsListDrawer = document.getElementById('resultsListDrawer');
    const historyToggle = document.getElementById('historyToggle');
    const historyBadge = document.getElementById('historyBadge');
    const drawerOverlay = document.getElementById('drawerOverlay');
    let historyCount = 0;

    const RECORD_MS = 12000;
    const GAP_MS = 2000;

    /* ── Settings / Provider management ── */
    const DEFAULT_SPOTIFY_CLIENT_ID = '3f01a346ee3b4a6390dac357a028c00b';
    const DEFAULTS = {
      provider: 'acrcloud',
      bgMode: 'youtube',
      musicSource: 'listen',
      spotifyClientId: DEFAULT_SPOTIFY_CLIENT_ID,
      acrHost: 'identify-us-west-2.acrcloud.com',
      acrKey: '7b1bf1fbd0364b74c621f7c629885d8a',
      acrSecret: 'd3Ozm0OqTkX6E1Iyu39sft8CWlYOEsWeHWIJRQZB',
      auddToken: '15b8d3ac5946ec625264fec02d9cdb15',
      lyricsOffsetMs: 2200,
      searchDebug: false,
      showSocialPosts: false
    };

    const SETTINGS_KEY = 'djlive_settings2';
    function loadSettings() {
      try {
        const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
        const merged = s ? { ...DEFAULTS, ...s } : { ...DEFAULTS };
        if (!['youtube', 'video', 'both', 'visualizer'].includes(merged.bgMode)) merged.bgMode = DEFAULTS.bgMode;
        if (!['listen', 'spotify'].includes(merged.musicSource)) merged.musicSource = DEFAULTS.musicSource;
        return merged;
      } catch (_) { return { ...DEFAULTS }; }
    }
    function saveSettings(s) {
      try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (_) {}
    }

    let settings = loadSettings();

    /* ── API usage tracking (per-day, per-provider) ── */
    const API_LIMITS = { acrcloud: 100, audd: 300 };

    function todayKey() { return new Date().toISOString().slice(0, 10); }

    function loadUsage() {
      try {
        const u = JSON.parse(localStorage.getItem('djlive_usage'));
        if (u && u.date === todayKey()) return u;
      } catch (_) {}
      return { date: todayKey(), acrcloud: 0, audd: 0 };
    }
    function saveUsage(u) { localStorage.setItem('djlive_usage', JSON.stringify(u)); }

    let usage = loadUsage();

    function trackRequest(provider) {
      if (usage.date !== todayKey()) { usage = { date: todayKey(), acrcloud: 0, audd: 0 }; }
      usage[provider] = (usage[provider] || 0) + 1;
      saveUsage(usage);
    }

    function getUsageText(provider) {
      if (usage.date !== todayKey()) return '0 / ' + API_LIMITS[provider] + ' used today';
      const used = usage[provider] || 0;
      const limit = API_LIMITS[provider];
      const left = Math.max(0, limit - used);
      return used + ' / ' + limit + ' used today (' + left + ' remaining)';
    }

    /* Settings modal wiring */
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const stgStatus = document.getElementById('stgStatus');
    const bgBtns = settingsOverlay.querySelectorAll('[data-bg]');
    const musicSourceBtns = settingsOverlay.querySelectorAll('[data-music-source]');
    const fieldsSpotify = document.getElementById('fieldsSpotify');
    let stgBgMode = settings.bgMode;
    let stgMusicSource = settings.musicSource;

    function renderUsageBar(containerId, provider) {
      const el = document.getElementById(containerId);
      if (!el) return;
      if (usage.date !== todayKey()) usage = { date: todayKey(), acrcloud: 0, audd: 0 };
      const used = usage[provider] || 0;
      const limit = API_LIMITS[provider];
      const pct = Math.min(100, (used / limit) * 100);
      const left = Math.max(0, limit - used);
      const cls = pct >= 90 ? 'crit' : pct >= 70 ? 'warn' : '';
      el.innerHTML =
        '<div class="stg-usage-bar"><div class="stg-usage-fill ' + cls + '" style="width:' + pct + '%"></div></div>' +
        '<span class="stg-usage-text">' + left + ' / ' + limit + ' left today</span>';
    }

    function openSettings() {
      stgBgMode = settings.bgMode;
      stgMusicSource = settings.musicSource;
      document.getElementById('spotifyClientId').value = settings.spotifyClientId || DEFAULT_SPOTIFY_CLIENT_ID;
      const redirectHint = document.getElementById('spotifyRedirectUriHint');
      if (redirectHint) redirectHint.textContent = window.location.origin + (window.location.pathname || '/');
      const lo = settings.lyricsOffsetMs ?? DEFAULTS.lyricsOffsetMs ?? 2200;
      document.getElementById('lyricsOffsetMs').value = lo;
      document.getElementById('searchDebugCb').checked = !!settings.searchDebug;
      document.getElementById('showSocialPostsCb').checked = !!settings.showSocialPosts;
      bgBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.bg === stgBgMode);
      });
      musicSourceBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.musicSource === stgMusicSource);
      });
      fieldsSpotify.classList.toggle('visible', stgMusicSource === 'spotify');
      updateSpotifyButtons(!!getSpotifyAccessToken());
      const token = getSpotifyAccessToken();
      if (token) fetchSpotifyProfile(token).then(p => { if (p) updateSpotifyProfileUI(p); });
      stgStatus.textContent = '';
      stgStatus.className = 'stg-status';
      settingsOverlay.classList.add('visible');
    }
    function closeSettings() { settingsOverlay.classList.remove('visible'); }

    bgBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        stgBgMode = btn.dataset.bg;
        bgBtns.forEach(b => b.classList.toggle('active', b === btn));
      });
    });

    musicSourceBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        stgMusicSource = btn.dataset.musicSource;
        musicSourceBtns.forEach(b => b.classList.toggle('active', b === btn));
        fieldsSpotify.classList.toggle('visible', stgMusicSource === 'spotify');
      });
    });

    document.getElementById('lyricsOffsetMinus')?.addEventListener('click', () => {
      const inp = document.getElementById('lyricsOffsetMs');
      const v = parseInt(inp.value || '0', 10) - 500;
      inp.value = Math.max(-3000, v);
    });
    document.getElementById('lyricsOffsetPlus')?.addEventListener('click', () => {
      const inp = document.getElementById('lyricsOffsetMs');
      const v = parseInt(inp.value || '0', 10) + 500;
      inp.value = Math.min(3000, v);
    });

    settingsBtn.addEventListener('click', openSettings);
    document.getElementById('stgCancel').addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) closeSettings(); });

    /* ── Spotify (PKCE, no backend) ── */
    const SPOTIFY_STORAGE_KEY = 'djlive_spotify';
    let spotifyPollInterval = null;

    function getSpotifyAccessToken() {
      try {
        const d = JSON.parse(localStorage.getItem(SPOTIFY_STORAGE_KEY));
        if (d?.access_token) return d.access_token;
      } catch (_) {}
      return null;
    }

    function updateSpotifyProfileUI(profile) {
      const row = document.getElementById('spotifyProfileRow');
      const img = document.getElementById('spotifyProfileImg');
      const name = document.getElementById('spotifyProfileName');
      if (!row || !img || !name) return;
      if (profile) {
        row.style.display = 'flex';
        const url = profile.images?.[0]?.url || '';
        img.src = url;
        img.alt = profile.display_name || 'Profile';
        img.style.display = url ? 'block' : 'none';
        img.onerror = () => { img.style.display = 'none'; };
        name.textContent = profile.display_name || 'Signed in';
      } else {
        row.style.display = 'none';
        img.src = '';
        img.onerror = null;
        name.textContent = '';
      }
    }

    function updateSpotifyButtons(loggedIn) {
      const signIn = document.getElementById('spotifySignIn');
      const signOut = document.getElementById('spotifySignOut');
      if (signIn) signIn.style.opacity = loggedIn ? '0.6' : '1';
      if (signIn) signIn.disabled = loggedIn;
      if (signOut) signOut.style.opacity = loggedIn ? '1' : '0.6';
      if (signOut) signOut.disabled = !loggedIn;
    }

    function generateRandomString(len) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const arr = new Uint8Array(len);
      crypto.getRandomValues(arr);
      return Array.from(arr, c => chars[c % chars.length]).join('');
    }

    async function sha256(plain) {
      const enc = new TextEncoder();
      const buf = await crypto.subtle.digest('SHA-256', enc.encode(plain));
      return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function spotifyTrackToResult(track) {
      if (!track) return null;
      const artist = track.artists?.map(a => a.name).join(', ') || 'Unknown';
      const title = track.name || 'Unknown';
      const album = track.album?.name || '';
      const dur = track.duration_ms || null;
      const img = track.album?.images?.[0]?.url;
      const url = track.external_urls?.spotify || (track.id ? 'https://open.spotify.com/track/' + track.id : null);
      return {
        title, artist, album,
        timecode: '0:00',
        spotify: {
          id: track.id,
          duration_ms: dur,
          external_urls: url ? { spotify: url } : null,
          album: img ? { images: [{ url: img }] } : null
        }
      };
    }

    function onSpotifyNowPlaying(track, progressMs) {
      const r = spotifyTrackToResult(track);
      if (!r) return;
      const key = r.artist + '::' + r.title;
      const now = performance.now();
      if (key === curKey) {
        curResult = r;
        curDurationMs = r.spotify?.duration_ms || curDurationMs;
        return;
      }
      if (curResult) addHistory(curResult, 'Played');
      curKey = key;
      curLabel = r.title + ' — ' + r.artist;
      curTitle = r.title;
      curArtist = r.artist;
      curDurationMs = r.spotify?.duration_ms || null;
      curResult = r;
      curStartedAt = Number.isFinite(progressMs) ? now - progressMs : now;
      addHistory(r, '', null);
      showNowPlaying(r, 'From Spotify');
      fetchCoverArt(r);
      const token = getSpotifyAccessToken();
      fetchLyrics(r.title, r.artist, r.album, curDurationMs, { spotifyTrackId: track.id, spotifyToken: token });
      if (videoForKey !== key) searchAndPlayVideo(r.title, r.artist, 0);
      document.body.classList.add('has-song');
      nowPlaying.classList.add('visible');
      startProgress();
      startLyrics();
    }

    async function fetchSpotifyProfile(token) {
      if (!token) return null;
      try {
        const res = await fetch('https://api.spotify.com/v1/me', {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (!res.ok) return null;
        return await res.json();
      } catch (_) { return null; }
    }

    async function fetchSpotifyCurrentlyPlaying(token) {
      const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (res.status === 204 || (res.status === 200 && !res.headers.get('content-type')?.includes('json'))) return null;
      if (!res.ok) throw new Error(res.status === 401 ? 'Token expired' : 'Spotify API error');
      const data = await res.json();
      if (!data?.item) return null;
      return { item: data.item, progress_ms: data.progress_ms ?? 0, is_playing: !!data.is_playing };
    }

    async function fetchSpotifyLyrics(trackId, token) {
      if (!trackId || !token) return null;
      try {
        const res = await fetch('https://spclient.wg.spotify.com/color-lyrics/v2/track/' + trackId + '?format=json&vocalRemoval=false', {
          headers: { 'Authorization': 'Bearer ' + token, 'app-platform': 'WebPlayer' }
        });
        if (!res.ok) return null;
        const data = await res.json();
        const lines = data?.lyrics?.lines;
        if (!Array.isArray(lines) || !lines.length) return null;
        return lines.map(l => ({
          time: parseInt(l.startTimeMs, 10) || 0,

    async function fetchSpotifyAudioAnalysis(trackId, token) {
      if (!trackId || !token) return null;
      try {
        const res = await fetch('https://api.spotify.com/v1/audio-analysis/' + trackId, {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (!res.ok) return null;
        const data = await res.json();
        const segments = data?.segments;
        const beats = data?.beats || [];
        const track = data?.track || {};
        if (!Array.isArray(segments) || !segments.length) return null;
        return { segments, beats, duration: track.duration || 0 };
      } catch (_) { return null; }
    }

    async function fetchSpotifyAudioFeatures(trackId, token) {

    async function refreshSpotifyToken() {
      try {
        const d = JSON.parse(localStorage.getItem(SPOTIFY_STORAGE_KEY));
        const clientId = (settings.spotifyClientId || DEFAULT_SPOTIFY_CLIENT_ID).trim();
        if (!d?.refresh_token || !clientId) return null;
        const res = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'refresh_token',
            refresh_token: d.refresh_token,
            client_id: clientId
          })
        });
        const data = await res.json();
        if (data.access_token) {
          d.access_token = data.access_token;
          if (data.expires_in) d.expires_at = Date.now() + data.expires_in * 1000;
          localStorage.setItem(SPOTIFY_STORAGE_KEY, JSON.stringify(d));
          return d.access_token;
        }
      } catch (_) {}
      return null;
    }

    function startSpotifyPolling() {
      if (spotifyPollInterval) clearInterval(spotifyPollInterval);
      spotifyPollInterval = null;
      if (settings.musicSource !== 'spotify') return;
      let lastId = null;
      spotifyPollInterval = setInterval(async () => {
        try {
          let token = getSpotifyAccessToken();
          if (!token) return;
          const d = JSON.parse(localStorage.getItem(SPOTIFY_STORAGE_KEY));
          if (d?.expires_at && Date.now() > d.expires_at - 60000) {
            token = await refreshSpotifyToken();
          }
          if (!token) {
            if (lastId && curKey) { hideNowPlaying(); curKey = null; curResult = null; }
            lastId = null;
            return;
          }
          const playback = await fetchSpotifyCurrentlyPlaying(token);
          if (!playback) {
            if (lastId && curKey) { hideNowPlaying(); curKey = null; curResult = null; }
            lastId = null;
            return;
          }
          const { item, progress_ms, is_playing } = playback;
          const id = item.id;
          const prog = Math.max(0, progress_ms ?? 0);
          if (curKey && settings.musicSource === 'spotify') {
            curStartedAt = performance.now() - prog;
            if (!is_playing && !isPaused) showPaused();
            else if (is_playing && isPaused) resumeFromPause();
          }
          if (id !== lastId) { lastId = id; onSpotifyNowPlaying(item, prog); }
        } catch (_) {}
      }, 2500);
    }

    (async function handleSpotifyOAuthCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (!code) return;
      const verifier = sessionStorage.getItem('spotify_code_verifier');
      const clientId = (settings.spotifyClientId || DEFAULT_SPOTIFY_CLIENT_ID).trim();
      if (!verifier || !clientId) return;
      try {
        const res = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            code: code,
            redirect_uri: window.location.origin + (window.location.pathname || '/'),
            client_id: clientId,
            code_verifier: verifier
          })
        });
        const data = await res.json();
        if (data.access_token) {
          const stored = { access_token: data.access_token, refresh_token: data.refresh_token, expires_at: Date.now() + (data.expires_in || 3600) * 1000 };
          localStorage.setItem(SPOTIFY_STORAGE_KEY, JSON.stringify(stored));

    function fmtPos(ms) {
      if (!Number.isFinite(ms) || ms < 0) return '0:00';
      const t = Math.floor(ms / 1000);
      return Math.floor(t / 60) + ':' + String(t % 60).padStart(2, '0');

    function parseTimecode(tc) {
      if (!tc || typeof tc !== 'string') return null;
      const p = tc.split(':').map(Number);
      if (p.some(isNaN)) return null;
      if (p.length === 2) return (p[0] * 60 + p[1]) * 1000;
      if (p.length === 3) return (p[0] * 3600 + p[1] * 60 + p[2]) * 1000;
      return null;
    }

    function isSameSong(a1, t1, a2, t2) {
      const norm = s => (s || '').toLowerCase()
        .replace(/\s*\([^)]*\)/g, '')
        .replace(/[^\w\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      return norm(a1) === norm(a2) && norm(t1) === norm(t2);

    async function fetchSocialPosts(artist, title) {
      const key = (artist || '') + '::' + (title || '');
      if (!key || key === '::') { clearSocialPosts(); return; }
      if (!socialPostsTicker) return;

      socialPostsForKey = key;
      socialPostsList = [];
      socialPostsTicker.innerHTML = '<div class="social-posts-loading">Loading Reddit...</div>';
      socialPostsTicker.classList.add('visible');

      try {
        const q = encodeURIComponent(artist + ' ' + title);
        const redditUrl = 'https://www.reddit.com/search.json?q=' + q + '&sort=relevance&limit=50&restrict_sr=false';
        const url = 'https://corsproxy.io/?' + encodeURIComponent(redditUrl);
        const res = await fetch(url);
        if (socialPostsForKey !== key) return;
        const data = await res.json();

        const children = data?.data?.children || [];
        const seen = new Set();
        const posts = [];
        for (const c of children) {
          const d = c?.data || {};
          const id = d.id;
          if (!id || seen.has(id)) continue;
          seen.add(id);
          posts.push({ id, title: d.title, subreddit: d.subreddit, author: d.author, permalink: d.permalink, url: d.url, score: d.score, num_comments: d.num_comments });
          if (posts.length >= 20) break;
        }

        socialPostsList = posts;
        if (posts.length > 0) {
          const commentIds = posts.slice(0, 5).map(p => p.id);
          for (const postId of commentIds) {
            if (socialPostsForKey !== key) break;
            try {
              const commUrl = 'https://www.reddit.com/comments/' + postId + '.json?limit=8';
              const commRes = await fetch('https://corsproxy.io/?' + encodeURIComponent(commUrl));
              if (!commRes.ok || socialPostsForKey !== key) break;
              const commData = await commRes.json();
              const commList = commData?.[1]?.data?.children || [];
              for (const cc of commList) {
                const cd = cc?.data || {};
                if (cd.kind === 't1' && cd.body && cd.id && !seen.has('c-' + cd.id)) {
                  seen.add('c-' + cd.id);
                  socialPostsList.push({ type: 'comment', id: 'c-' + cd.id, body: cd.body, subreddit: cd.subreddit || posts[0].subreddit, author: cd.author, permalink: cd.permalink, score: cd.score });
                  if (socialPostsList.length >= 40) break;
                }
              }
            } catch (_) {}
          }
        }

        if (socialPostsList.length === 0) {
          socialPostsTicker.innerHTML = '<div class="social-posts-loading">No posts found</div>';
          return;
        }

        if (socialPostsRotateId) clearInterval(socialPostsRotateId);

    /* ── WAV conversion ── */
    function blobToWav(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const buf = await ctx.decodeAudioData(reader.result);
            const samples = buf.getChannelData(0);
            const sr = buf.sampleRate;
            const ab = new ArrayBuffer(44 + samples.length * 2);
            const v = new DataView(ab);
            const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
            ws(0,'RIFF'); v.setUint32(4,36+samples.length*2,true); ws(8,'WAVE');
            ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
            v.setUint16(22,1,true); v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
            v.setUint16(32,2,true); v.setUint16(34,16,true);
            ws(36,'data'); v.setUint32(40,samples.length*2,true);
            for (let i = 0; i < samples.length; i++) {
              const s = Math.max(-1,Math.min(1,samples[i]));
              v.setInt16(44+i*2, s<0?s*0x8000:s*0x7FFF, true);
            }
            ctx.close();
            resolve(new Blob([ab], { type: 'audio/wav' }));
          } catch(e) { reject(e); }
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsArrayBuffer(blob);
      });
    }

    /* ── Lyrics (LRCLIB) ── */
    const lyricsBox = document.getElementById('lyricsBox');
    const lyricsLinks = document.getElementById('lyricsLinks');
    const lyricsInner = document.getElementById('lyricsInner');

    function updateLyricsLinks() {
      if (!lyricsLinks) return;
      lyricsLinks.innerHTML = '';
    }
    let syncedLines = [];
    let lyricsForKey = null;

    function parseLRC(lrc) {
      if (!lrc) return [];
      const lines = [];
      for (const raw of lrc.split('\n')) {
        const m = raw.match(/^\[(\d{2}):(\d{2})\.(\d{2,3})\]\s?(.*)/);
        if (m) {
          const ms = (+m[1] * 60 + +m[2]) * 1000 + (+m[3] < 100 ? +m[3] * 10 : +m[3]);
          lines.push({ time: ms, text: m[4].trim() || '♪' });
        }
      }
      return lines.sort((a, b) => a.time - b.time);
    }

    function renderLyricsLines() {
      lyricsInner.innerHTML = '';
      for (let i = 0; i < syncedLines.length; i++) {
        const el = document.createElement('div');
        el.className = 'lyrics-line';
        el.textContent = syncedLines[i].text;
        el.dataset.idx = i;
        lyricsInner.appendChild(el);
      }
    }

    let lyricsAnimId = null;
    let lyricsScrollTarget = 0;
    let lyricsScrollCurrent = 0;
    let lyricsLastActiveIdx = -2;

    function tickLyrics() {
      if (!curStartedAt || !syncedLines.length) return;
      const offset = settings.lyricsOffsetMs ?? 2200;
      const elapsed = (isPaused ? pausedAtElapsed : Math.max(0, performance.now() - curStartedAt)) + offset;
      let activeIdx = -1;
      for (let i = syncedLines.length - 1; i >= 0; i--) {
        if (elapsed >= syncedLines[i].time) { activeIdx = i; break; }
      }
      const els = lyricsInner.children;
      if (activeIdx !== lyricsLastActiveIdx && activeIdx >= 0 && els[activeIdx]) {
        const container = lyricsBox;
        const lineEl = els[activeIdx];
        lyricsScrollTarget = Math.max(0, lineEl.offsetTop - container.offsetHeight / 2 + lineEl.offsetHeight / 2);
        lyricsLastActiveIdx = activeIdx;
      }
      for (let i = 0; i < els.length; i++) {
        const wantActive = i === activeIdx;
        const wantPast = i < activeIdx;
        const el = els[i];
        if (el.classList.contains('active') !== wantActive) el.classList.toggle('active', wantActive);
        if (el.classList.contains('past') !== wantPast) el.classList.toggle('past', wantPast);
      }
    }

    function lyricsLoop() {
      tickLyrics();
      lyricsScrollCurrent += (lyricsScrollTarget - lyricsScrollCurrent) * 0.3;
      if (Math.abs(lyricsScrollTarget - lyricsScrollCurrent) < 1) lyricsScrollCurrent = lyricsScrollTarget;
      lyricsInner.style.transform = 'translateY(' + Math.round(-lyricsScrollCurrent) + 'px)';
      lyricsAnimId = requestAnimationFrame(lyricsLoop);
    }

    function startLyrics() {
      stopLyrics();
      if (syncedLines.length) {
        lyricsScrollCurrent = lyricsScrollTarget = 0;
        lyricsLastActiveIdx = -2;
        tickLyrics();
        lyricsAnimId = requestAnimationFrame(lyricsLoop);
      }
    }

    function stopLyrics() {
      if (lyricsAnimId) { cancelAnimationFrame(lyricsAnimId); lyricsAnimId = null; }
    }

    function clearLyrics() {
      stopLyrics();
      syncedLines = [];
      lyricsForKey = null;
      if (lyricsLinks) lyricsLinks.innerHTML = '';
      lyricsInner.innerHTML = '';
      lyricsInner.style.transform = '';
      lyricsBox.style.overflow = '';
      lyricsBox.classList.remove('visible');
    }

    async function fetchLyrics(title, artist, album, durationMs, opts) {
      const key = artist + '::' + title;
      if (lyricsForKey === key) return;
      stopLyrics();
      syncedLines = [];
      lyricsInner.innerHTML = '';
      lyricsInner.style.transform = '';
      lyricsBox.style.overflow = '';
      lyricsBox.classList.remove('visible');
      lyricsForKey = key;

      const params = new URLSearchParams({ track_name: title, artist_name: artist });
      if (album && album !== title) params.set('album_name', album);
      if (durationMs > 0) params.set('duration', Math.round(durationMs / 1000));

      function showSynced(lines) {
        syncedLines = lines;
        renderLyricsLines();
        updateLyricsLinks();
        lyricsBox.classList.add('visible');
        startLyrics();
      }
      function showPlain(text) {
        lyricsInner.innerHTML = '';
        for (const line of text.split('\n')) {
          const el = document.createElement('div');
          el.className = 'lyrics-line';
          el.textContent = line || '♪';
          lyricsInner.appendChild(el);
        }
        updateLyricsLinks();
        lyricsBox.classList.add('visible');
        lyricsBox.style.overflow = 'auto';
      }

      try {
        const spotifyOpts = opts || {};
        /* Spotify color-lyrics API returns 403 — use LRCLIB only */
        const searchRes = await fetch('https://lrclib.net/api/search?' + new URLSearchParams({
          track_name: title, artist_name: artist
        }));
        if (lyricsForKey !== key) return;

        if (searchRes.ok) {
          const results = await searchRes.json();
          const match = results.find(r => r.syncedLyrics) || results.find(r => r.plainLyrics);
          if (match?.syncedLyrics) {
            const parsed = parseLRC(match.syncedLyrics);
            if (parsed.length) { showSynced(parsed); return; }
          }
          if (match?.plainLyrics) { showPlain(match.plainLyrics); return; }
        }

        if (durationMs > 0 && album) {
          params.set('album_name', album);
          params.set('duration', Math.round(durationMs / 1000));
          const exactRes = await fetch('https://lrclib.net/api/get?' + params);
          if (lyricsForKey !== key) return;
          if (exactRes.ok) {
            const data = await exactRes.json();
            if (data.syncedLyrics) {
              const parsed = parseLRC(data.syncedLyrics);
              if (parsed.length) { showSynced(parsed); return; }
            }
            if (data.plainLyrics) { showPlain(data.plainLyrics); }
          }
        }
      } catch (_) {
        /* lyrics are non-critical; silently skip */
      }
    }

    function showVideoIframe(src, platform) {
      document.body.classList.remove('video-ready');

    let _ytPlayer = null;
    let _onYtError = null;

    function embedYouTube(videoId, startSec, videoTitle, channel, onUnavailable, onPlaying) {
      _onYtError = onUnavailable || null;
      document.body.classList.remove('video-ready');
      const div = document.createElement('div');
      div.id = 'yt-player-' + Date.now();
      videoBg.innerHTML = '';
      videoBg.appendChild(div);
      document.body.classList.add('has-video');

      if (_ytPlayer) { try { _ytPlayer.destroy(); } catch(_) {} _ytPlayer = null; }

      _ytPlayer = new YT.Player(div.id, {
        videoId: videoId,
        playerVars: {
          autoplay: 1, mute: 1, controls: 0, loop: 1, playlist: videoId,
          modestbranding: 1, iv_load_policy: 3, disablekb: 1, playsinline: 1,
          rel: 0, vq: 'hd1080', start: Math.max(0, Math.floor(startSec || 0))
        },
        events: {
          onReady: function(e) {
            console.log('[Video] YouTube player ready: ' + videoId);
            /* Fallback: if play state never fires, show after 5s */
            setTimeout(() => {
              if (!document.body.classList.contains('video-ready')) document.body.classList.add('video-ready');
            }, 5000);
          },
          onStateChange: function(e) {
            if (e.data === 1) {
              document.body.classList.add('video-ready');
              if (onPlaying) onPlaying();
            }
          },
          onError: function(e) {
            console.warn('[Video] YouTube error code ' + e.data + ' for ' + videoId);
            if (_onYtError) { const cb = _onYtError; _onYtError = null; cb(); }
          }
        }
      });
      showVideoBadge(videoTitle, channel, 'youtube');
    }

    function embedDailymotion(videoId, videoTitle, channel) {
      const src = 'https://www.dailymotion.com/embed/video/' + videoId +
        '?autoplay=1&mute=1&controls=false&queue-enable=false&loop=true' +
        '&sharing-enable=false&ui-logo=false&ui-start-screen-info=false';
      showVideoIframe(src, 'Dailymotion');
      showVideoBadge(videoTitle, channel, 'dailymotion');
    }

    let _searchArtist = '';
    let _searchTitle = '';

    function normalize(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]/g, ''); }

    function isOfficialChannel(v) {
      const ch = (v['owner.screenname'] || '').toLowerCase();
      if (!ch || !_searchArtist) return false;
      const a = normalize(_searchArtist);
      const c = normalize(ch);
      return c.includes(a) || a.includes(c) || ch.includes('vevo');
    }

    function titleContains(v, text) {
      const t = (v.title || '').toLowerCase();
      const parts = text.toLowerCase().split(/[\s,&]+/).filter(p => p.length > 2);
      return parts.length > 0 && parts.every(p => t.includes(p));
    }

    function isArtistLive(v) {
      const t = (v.title || '').toLowerCase();
      const a = _searchArtist.toLowerCase();
      const idx = t.indexOf(a);
      if (idx < 0) return false;
      const after = t.slice(idx + a.length);
      return /^[\s\-—|:,]*\b(live|concert|performanc|festival|unplugged|tour)\b/.test(after);
    }

    function rankVideo(v) {
      const t = (v.title || '').toLowerCase();
      const official = isOfficialChannel(v);
      const hasArtist = titleContains(v, _searchArtist);
      const hasSong = titleContains(v, _searchTitle);
      const hasArtistOrSong = hasArtist || hasSong;
      const liveAfterArtist = isArtistLive(v);
      const hasLive = /\blive\b|\bconcert\b|\bperformanc|\bfestival\b|\bunplugged\b/.test(t);
      if (/lyric\s*video|\blyrics\b|official\s*lyric/.test(t)) return 99;
      if ((/official\s*(music\s*)?video|official\s*mv/.test(t)) && official && hasSong) return 0;
      if (!hasArtistOrSong) return 98;
      if (liveAfterArtist || (official && hasArtist && /\blive\b|\bconcert\b/.test(t)) || (hasArtist && hasLive && /@/.test(t))) return 1;
      if (hasArtist && hasLive) return 2;
      if (hasArtist && hasSong) return 3;
      if (hasArtist) return 4;
      return 98;
    }

    function rankLabel(v) {
      const r = rankVideo(v);
      const ch = v['owner.screenname'] || '?';
      if (r === 0) return 'Official MV (' + ch + ')';
      if (r === 1) return 'Concert/live — strict (' + ch + ')';
      if (r === 2) return 'Live + artist in title (' + ch + ')';
      if (r === 3) return 'Artist + song match (' + ch + ')';
      if (r === 4) return 'Artist match (' + ch + ')';
      if (r === 99) return 'Lyric video — skip';
      return 'No match — skip (' + ch + ')';
    }

    function dedupeById(items) {
      if (!items?.length) return items || [];
      const seen = new Set();
      return items.filter(v => { const id = v?.id; if (!id || seen.has(id)) return false; seen.add(id); return true; });
    }

    function bestFromList(items, maxRank) {
      return bestFromListWithTier(items, maxRank, null);
    }

    function bestFromListWithTier(items, maxRank, tierLabel) {
      if (!items?.length) return null;
      const valid = items.filter(v => rankVideo(v) <= maxRank);
      if (!valid.length) return null;
      const prefersOfficial = tierLabel === 'Official Music Video';
      const isLiveTier = tierLabel === 'Live / Concert';
      const hasOfficialInTitle = v => /official\s*(music\s*)?video|official\s*mv/.test((v.title || '').toLowerCase());
      const hasLiveInTitle = v => /\blive\b|\bconcert\b|\bperformanc|\bfestival\b/.test((v.title || '').toLowerCase());
      const hasFullSet = v => /\b(full\s*set|full\s*concert|complete\s*set|full\s*show|full\s*live)\b/.test((v.title || '').toLowerCase());
      const hasSong = v => titleContains(v, _searchTitle);
      return valid.sort((a, b) => {
        const ra = rankVideo(a), rb = rankVideo(b);
        if (prefersOfficial) {
          const aOfficial = hasOfficialInTitle(a), bOfficial = hasOfficialInTitle(b);
          const aLive = hasLiveInTitle(a), bLive = hasLiveInTitle(b);
          if (aOfficial && !bOfficial) return -1;
          if (!aOfficial && bOfficial) return 1;
          if (!aLive && bLive) return -1;
          if (aLive && !bLive) return 1;
        }
        if (isLiveTier && !hasSong(a) && !hasSong(b)) {
          const aFull = hasFullSet(a), bFull = hasFullSet(b);
          if (aFull && !bFull) return -1;
          if (!aFull && bFull) return 1;
        }
        return ra - rb;
      })[0];
    }

    function rankedList(items, maxRank, tierLabel) {
      if (!items?.length) return [];
      const valid = items.filter(v => rankVideo(v) <= maxRank);
      if (!tierLabel) return valid.sort((a, b) => rankVideo(a) - rankVideo(b));
      const isLiveTier = tierLabel === 'Live / Concert';
      const prefersOfficial = tierLabel === 'Official Music Video';
      const hasOfficialInTitle = v => /official\s*(music\s*)?video|official\s*mv/.test((v.title || '').toLowerCase());
      const hasLiveInTitle = v => /\blive\b|\bconcert\b|\bperformanc|\bfestival\b/.test((v.title || '').toLowerCase());
      const hasFullSet = v => /\b(full\s*set|full\s*concert|complete\s*set|full\s*show|full\s*live)\b/.test((v.title || '').toLowerCase());
      const hasSong = v => titleContains(v, _searchTitle);
      return valid.sort((a, b) => {
        const ra = rankVideo(a), rb = rankVideo(b);
        if (prefersOfficial) {
          const aOfficial = hasOfficialInTitle(a), bOfficial = hasOfficialInTitle(b);
          const aLive = hasLiveInTitle(a), bLive = hasLiveInTitle(b);
          if (aOfficial && !bOfficial) return -1;
          if (!aOfficial && bOfficial) return 1;
          if (!aLive && bLive) return -1;
          if (aLive && !bLive) return 1;
        }
        if (isLiveTier && !hasSong(a) && !hasSong(b)) {
          const aFull = hasFullSet(a), bFull = hasFullSet(b);
          if (aFull && !bFull) return -1;
          if (!aFull && bFull) return 1;
        }
        return ra - rb;
      });
    }

    function tryEmbedYt(candidates, idx, startSec, key, onAllFailed) {
      if (videoForKey !== key) return;
      if (idx >= candidates.length) {
        console.log('[Video] All YouTube candidates unavailable, falling back');
        if (onAllFailed) onAllFailed();
