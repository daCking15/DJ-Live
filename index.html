      const v = candidates[idx];
      const videoData = { platform: 'youtube', id: v.id, title: v.title, channel: v['owner.screenname'] || '', url: 'https://www.youtube.com/watch?v=' + v.id, thumb: 'https://img.youtube.com/vi/' + v.id + '/hqdefault.jpg' };
      currentSongVideo = { key, data: videoData };
      console.log('[Video] YouTube trying ' + (idx + 1) + '/' + candidates.length + ': ' + v.title);
      embedYouTube(v.id, startSec, v.title, v['owner.screenname'], () => {
        console.log('[Video] Unavailable, trying next...');
        tryEmbedYt(candidates, idx + 1, startSec, key, onAllFailed);
      }, () => { if (videoForKey === key) updateHistoryWithVideo(key, videoData); });
    }

    /* ── YouTube search via local proxy (run: node yt-proxy.js or python3 yt-proxy.py) ── */
    const YT_PROXY = 'http://localhost:3001';
    let ytProxyOk = null;

    async function ytSearch(query, key) {
      try {
        const res = await fetch(
          YT_PROXY + '/?q=' + encodeURIComponent(query),
          { signal: AbortSignal.timeout(6000) }
        );
        if (videoForKey !== key) return null;
        if (!res.ok) return null;
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) return null;
        if (!ytProxyOk) { ytProxyOk = true; console.log('[YT] Proxy connected'); }
        return data.map(v => ({
          id: v.id,
          title: v.title || '',
          'owner.screenname': v.channel || '',
          duration: 0
        }));
      } catch (e) {
        if (ytProxyOk !== false) {
          ytProxyOk = false;
          console.warn('[YT] Proxy not running — start it with: node yt-proxy.js  (or python3 yt-proxy.py)');
          showError('YouTube proxy not running. Open a terminal and run: node yt-proxy.js');
        }
        return null;
      }
    }

    async function dmSearch(query, key) {
      const res = await fetch(
        'https://api.dailymotion.com/videos?search=' + encodeURIComponent(query) +
        '&limit=15&fields=id,title,duration,owner.screenname',
        { signal: AbortSignal.timeout(6000) }
      );
      if (videoForKey !== key || !res.ok) return null;
      const data = await res.json();
      return data.list?.length ? data.list : null;
    }

    async function searchAndPlayVideo(title, artist, startSec) {
      if (settings.bgMode === 'visualizer') return;

      const useYT = settings.bgMode === 'youtube';
      const useBoth = settings.bgMode === 'both';
      const platform = useBoth ? 'YT+DM' : (useYT ? 'YouTube' : 'Dailymotion');
      const searchFn = useYT ? ytSearch : dmSearch;

      const key = artist + '::' + title;
      if (videoForKey === key) return;
      videoForKey = key;
      currentSongVideo = null;
      _searchArtist = artist;
      _searchTitle = title;
      videoBg.innerHTML = '';
      document.body.classList.add('has-video');
      hideVideoBadge();
      stopAmbientCycle();
      if (searchDebugBox) searchDebugBox.innerHTML = '';

      const searches = [
        { q: artist + ' ' + title + ' official music video', maxRank: 0, tier: 0 }, /* 1st: official music video */
        { queries: [artist + ' ' + title + ' live', artist + ' live'], maxRank: 2, tier: 1 }, /* 2nd: live (song+artist + artist-only, incl @) */
        { q: artist + ' ' + title,                           maxRank: 3, tier: 2 }, /* 3rd: generic match */
      ];

      async function tryTierBoth(tierIdx) {
        if (tierIdx >= searches.length) {
          showSearchStatus('All tiers', '', 'falling back to ambient', '');
          console.log('[Video] No song video found — falling back to ambient visuals');
          if (videoForKey !== key) return;
          currentSongVideo = null;
          playAmbientVideo();
          return;
        }
        const s = searches[tierIdx];
        const tierLabel = TIER_LABELS[s.tier] || 'Tier ' + s.tier;
        const qDisplay = s.queries ? s.queries.join(', ') : s.q;
        try {
          showSearchStatus(tierLabel, 'yt', 'searching...', qDisplay);
          const ytList = s.queries
            ? dedupeById((await Promise.all(s.queries.map(q => ytSearch(q, key)))).map(r => r || []).flat())
            : await ytSearch(s.q, key);
          if (videoForKey !== key) return;
          if (s.queries) console.log('[Video][YT+DM] Tier ' + s.tier + ' → YouTube "' + qDisplay + '" → ' + (ytList?.length || 0) + ' merged');

          const ytPick = ytList?.length ? bestFromList(ytList, s.maxRank) : null;

            const candidates = rankedList(ytList, s.maxRank, tierLabel);
            tryEmbedYt(candidates, 0, startSec, key, async () => {
              if (videoForKey !== key) return;

              showSearchStatus(tierLabel, 'dm', 'YT unavailable, checking...', qDisplay);
              const dmList = s.queries

              if (s.queries) console.log('[Video][YT+DM] Tier ' + s.tier + ' → Dailymotion (YT unavailable) "' + qDisplay + '" → ' + (dmList?.length || 0) + ' merged');
              if (videoForKey !== key) return;
              const dmMaxRank = Math.max(s.maxRank, 3);

              if (dmPick) {

              } else {

            });
            return;
          }
          showSearchStatus(tierLabel, 'dm', 'YT had none, checking...', qDisplay);
          const dmList = s.queries
            ? dedupeById((await Promise.all(s.queries.map(q => dmSearch(q, key)))).map(r => r || []).flat())
            : await dmSearch(s.q, key);
          if (s.queries) console.log('[Video][YT+DM] Tier ' + s.tier + ' → Dailymotion (YT none) "' + qDisplay + '" → ' + (dmList?.length || 0) + ' merged');
          if (videoForKey !== key) return;
          const dmMaxRank = Math.max(s.maxRank, 3);
          const dmPick = dmList?.length ? bestFromListWithTier(dmList, dmMaxRank, tierLabel) : null;
          if (dmPick) {
            showSearchStatus(tierLabel, 'dm', 'found', dmPick.title);
            console.log('[Video][YT+DM] Tier ' + s.tier + ' ✓ Dailymotion:', dmPick.title, '|', rankLabel(dmPick));
            const videoData = { platform: 'dailymotion', id: dmPick.id, title: dmPick.title, channel: dmPick['owner.screenname'] || '', url: 'https://www.dailymotion.com/video/' + dmPick.id, thumb: 'https://www.dailymotion.com/thumbnail/video/' + dmPick.id };
            currentSongVideo = { key, data: videoData };
            embedDailymotion(dmPick.id, dmPick.title, dmPick['owner.screenname']);
            updateHistoryWithVideo(key, videoData);
            return;
          }
          showSearchStatus(tierLabel, 'dm', 'none found', '');

          showSearchStatus(tierLabel, useYT ? 'yt' : 'dm', 'none found', '');

    let ambientDmIdx = Math.floor(Math.random() * AMBIENT_DM.length);

    function stopAmbientCycle() {
      if (ambientCycleTimer) { clearTimeout(ambientCycleTimer); ambientCycleTimer = null; }

    function hideVideo() {
      if (vizRenderer) return;
      if (_ytPlayer) { try { _ytPlayer.destroy(); } catch(_) {} _ytPlayer = null; }
      _onYtError = null;

    /* ── Three.js Audio Visualizer ── */
    let vizAudioCtx = null, vizAnalyserNode = null;
    let vizRenderer = null, vizScene = null, vizCamera = null, vizAnimId = null;
    let vizSphere = null, vizInner = null, vizBars = [], vizParticles = null;
    let vizFreqData = null, vizTimeData = null;
    let vizSpotifyData = null;

    function startVisualizer() {
      if (vizRenderer) return;
      if (!vizAnalyserNode) return;

      stopAmbientCycle();
      videoBg.innerHTML = '';
      videoForKey = null;
      currentSongVideo = null;
      hideVideoBadge();

      const bufLen = vizAnalyserNode.frequencyBinCount;
      vizFreqData = new Uint8Array(bufLen);
      vizTimeData = new Uint8Array(bufLen);

      const w = window.innerWidth, h = window.innerHeight;
      vizScene = new THREE.Scene();
      vizCamera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
      vizCamera.position.z = 5;

      vizRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      vizRenderer.setSize(w, h);
      vizRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      vizRenderer.setClearColor(0x0a0a0f);
      videoBg.appendChild(vizRenderer.domElement);
      document.body.classList.remove('video-ready');
      document.body.classList.add('has-video');
      requestAnimationFrame(() => { document.body.classList.add('video-ready'); });

      const icoGeo = new THREE.IcosahedronGeometry(1.5, 4);
      icoGeo.userData.orig = new Float32Array(icoGeo.attributes.position.array);
      const wireMat = new THREE.MeshBasicMaterial({
        color: 0x00ff9d, wireframe: true, transparent: true, opacity: 0.25
      });
      vizSphere = new THREE.Mesh(icoGeo, wireMat);
      vizScene.add(vizSphere);

      const innerGeo = new THREE.IcosahedronGeometry(1.45, 3);
      const innerMat = new THREE.MeshBasicMaterial({
        color: 0x00ff9d, transparent: true, opacity: 0.04
      });
      vizInner = new THREE.Mesh(innerGeo, innerMat);
      vizScene.add(vizInner);

      const barCount = 64;
      const barGeo = new THREE.BoxGeometry(0.06, 1, 0.06);
      vizBars = [];
      for (let i = 0; i < barCount; i++) {
        const mat = new THREE.MeshBasicMaterial({
          color: 0x00ff9d, transparent: true, opacity: 0.55
        });
        const bar = new THREE.Mesh(barGeo, mat);
        const angle = (i / barCount) * Math.PI * 2;
        const r = 2.4;
        bar.position.x = Math.cos(angle) * r;
        bar.position.z = Math.sin(angle) * r;
        bar.rotation.z = -angle + Math.PI / 2;
        bar.rotation.y = angle;
        bar.userData.angle = angle;
        bar.scale.y = 0.1;
        vizScene.add(bar);
        vizBars.push(bar);
      }

      const pCount = 600;
      const pGeo = new THREE.BufferGeometry();
      const pPos = new Float32Array(pCount * 3);
      const pSpeeds = new Float32Array(pCount);
      for (let i = 0; i < pCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const rad = 3.5 + Math.random() * 5;
        pPos[i * 3] = rad * Math.sin(phi) * Math.cos(theta);
        pPos[i * 3 + 1] = rad * Math.sin(phi) * Math.sin(theta);
        pPos[i * 3 + 2] = rad * Math.cos(phi);
        pSpeeds[i] = 0.002 + Math.random() * 0.005;
      }
      pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
      pGeo.userData.speeds = pSpeeds;
      const pMat = new THREE.PointsMaterial({
        color: 0x00ff9d, size: 0.035, transparent: true, opacity: 0.5,
        blending: THREE.AdditiveBlending, depthWrite: false
      });
      vizParticles = new THREE.Points(pGeo, pMat);
      vizScene.add(vizParticles);

      window.addEventListener('resize', onVizResize);
      animateViz();
    }

    function onVizResize() {
      if (!vizRenderer) return;
      const w = window.innerWidth, h = window.innerHeight;
      vizCamera.aspect = w / h;
      vizCamera.updateProjectionMatrix();
      vizRenderer.setSize(w, h);
    }

    function animateViz() {
      vizAnimId = requestAnimationFrame(animateViz);
      if (!vizRenderer || !vizScene || !vizCamera) return;

      if (vizAnalyserNode) {
        vizAnalyserNode.getByteFrequencyData(vizFreqData);
        vizAnalyserNode.getByteTimeDomainData(vizTimeData);
      } else if (vizFreqData) {
        const t = performance.now() * 0.001;
        const base = 25 + 15 * Math.sin(t * 0.5);
        for (let i = 0; i < vizFreqData.length; i++) {
          vizFreqData[i] = Math.min(255, Math.max(0, base + 10 * Math.sin(t * 2 + i * 0.1)));
        }
      }

      let bass = 0, mid = 0, treble = 0, energy = 0;
      const len = vizFreqData.length;
      const bassEnd = Math.floor(len * 0.12);
      const midEnd = Math.floor(len * 0.5);
      for (let i = 0; i < len; i++) {
        const v = vizFreqData[i] / 255;
        energy += v;
        if (i < bassEnd) bass += v;
        else if (i < midEnd) mid += v;
        else treble += v;
      }
      bass = bassEnd > 0 ? bass / bassEnd : 0;
      mid = (midEnd - bassEnd) > 0 ? mid / (midEnd - bassEnd) : 0;
      treble = (len - midEnd) > 0 ? treble / (len - midEnd) : 0;
      energy = len > 0 ? energy / len : 0;

      const t = performance.now() * 0.001;

      if (vizSphere) {
        const geo = vizSphere.geometry;
        const pos = geo.attributes.position;
        const orig = geo.userData.orig;
        for (let i = 0; i < pos.count; i++) {
          const ox = orig[i * 3], oy = orig[i * 3 + 1], oz = orig[i * 3 + 2];
          const mag = Math.sqrt(ox * ox + oy * oy + oz * oz) || 1;
          const nx = ox / mag, ny = oy / mag, nz = oz / mag;
          const fi = Math.floor((Math.atan2(ny, nx) + Math.PI) / (Math.PI * 2) * len);
          const fv = (vizFreqData[fi % len] || 0) / 255;
          const disp = fv * 0.6 + Math.sin(t * 1.5 + i * 0.05) * 0.03;
          pos.array[i * 3] = ox + nx * disp;
          pos.array[i * 3 + 1] = oy + ny * disp;
          pos.array[i * 3 + 2] = oz + nz * disp;
        }
        pos.needsUpdate = true;
        vizSphere.rotation.y += 0.003 + bass * 0.012;
        vizSphere.rotation.x += 0.001 + treble * 0.003;
        vizSphere.material.opacity = 0.15 + energy * 0.45;
      }

      if (vizInner) {
        vizInner.rotation.copy(vizSphere.rotation);
        vizInner.scale.setScalar(0.96 + bass * 0.2);
        vizInner.material.opacity = 0.03 + energy * 0.1;
      }

      for (let i = 0; i < vizBars.length; i++) {
        const fi = Math.floor((i / vizBars.length) * len);
        const fv = (vizFreqData[fi % len] || 0) / 255;
        vizBars[i].scale.y = 0.05 + fv * 2.5;
        vizBars[i].material.opacity = 0.2 + fv * 0.6;
        const hue = 0.45 + fv * 0.12;
        vizBars[i].material.color.setHSL(hue, 1, 0.45 + fv * 0.2);
      }

      if (vizParticles) {
        const pp = vizParticles.geometry.attributes.position;
        const sp = vizParticles.geometry.userData.speeds;
        for (let i = 0; i < pp.count; i++) {
          const idx = i * 3;
          pp.array[idx] += Math.sin(t + i) * sp[i] * (1 + bass * 4);
          pp.array[idx + 1] += Math.cos(t * 0.7 + i) * sp[i] * (1 + mid * 3);
          pp.array[idx + 2] += Math.sin(t * 0.5 + i * 0.5) * sp[i];
          const d = Math.sqrt(pp.array[idx] ** 2 + pp.array[idx + 1] ** 2 + pp.array[idx + 2] ** 2);
          if (d > 9) {
            const s = (3.5 + Math.random() * 2) / d;
            pp.array[idx] *= s; pp.array[idx + 1] *= s; pp.array[idx + 2] *= s;
          }
        }
        pp.needsUpdate = true;
        vizParticles.rotation.y += 0.0008 + bass * 0.003;
        vizParticles.material.opacity = 0.25 + energy * 0.55;
        vizParticles.material.size = 0.025 + bass * 0.06;
      }

      const hue = 0.45 + energy * 0.15;
      if (vizSphere) vizSphere.material.color.setHSL(hue, 1, 0.45 + energy * 0.2);
      if (vizInner) vizInner.material.color.setHSL(hue, 0.8, 0.4 + energy * 0.15);

      vizRenderer.render(vizScene, vizCamera);
    }

    function destroyVisualizer() {
      document.body.classList.remove('video-ready');
      if (vizAnimId) { cancelAnimationFrame(vizAnimId); vizAnimId = null; }
      window.removeEventListener('resize', onVizResize);
      if (vizRenderer) {
        vizRenderer.dispose();
        if (vizRenderer.domElement && vizRenderer.domElement.parentNode) {
          vizRenderer.domElement.remove();
        }
        vizRenderer = null;
      }
      if (vizScene) {
        vizScene.traverse(obj => {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) obj.material.dispose();
        });
      }
      vizScene = null; vizCamera = null;
      vizSphere = null; vizInner = null;
      vizBars = []; vizParticles = null;
      vizFreqData = null; vizTimeData = null;
      vizSpotifyData = null;
      if (vizAnalyserNode && !isListening) {
        if (vizAudioCtx) { vizAudioCtx.close().catch(() => {}); vizAudioCtx = null; }
        vizAnalyserNode = null;
        if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
      }
    }

    async function initVisualizerAudioOnly() {
      if (vizAnalyserNode) { startVisualizer(); return; }
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
        });
      } catch (e1) {
        try {
          audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e2) {
          showError(e2?.name === 'NotAllowedError'
            ? 'Visualizer needs microphone access. Allow it in browser settings.'
            : (e2?.message || 'Could not access the microphone.'));
          return;
        }
      }
      vizAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const micSource = vizAudioCtx.createMediaStreamSource(audioStream);
      vizAnalyserNode = vizAudioCtx.createAnalyser();
      vizAnalyserNode.fftSize = 512;
      vizAnalyserNode.smoothingTimeConstant = 0.82;
      micSource.connect(vizAnalyserNode);
      startVisualizer();
    }

    /* ── ACRCloud HMAC-SHA1 signing (Web Crypto) ── */
    async function hmacSha1(secret, message) {
      const enc = new TextEncoder();
      const key = await crypto.subtle.importKey(
        'raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
      );
      const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
      return btoa(String.fromCharCode(...new Uint8Array(sig)));
    }

    /* ── Provider: ACRCloud ── */
    async function identifyACRCloud(audioBlob) {
      const host = settings.acrHost.replace(/^https?:\/\//, '');
      const ts = Math.floor(Date.now() / 1000).toString();
      const stringToSign = 'POST\n/v1/identify\n' + settings.acrKey + '\naudio\n1\n' + ts;
      const signature = await hmacSha1(settings.acrSecret, stringToSign);

      const bytes = await audioBlob.arrayBuffer();
      const fd = new FormData();
      fd.append('sample', audioBlob, 'sample.wav');
      fd.append('sample_bytes', bytes.byteLength.toString());
      fd.append('access_key', settings.acrKey);
      fd.append('data_type', 'audio');
      fd.append('signature_version', '1');
      fd.append('signature', signature);
      fd.append('timestamp', ts);

      const res = await fetch('https://' + host + '/v1/identify', { method: 'POST', body: fd });
      trackRequest('acrcloud');
      const data = await res.json();

      if (data.status?.code !== 0 || !data.metadata?.music?.length) {
        if (data.status?.code === 3003 || data.status?.code === 3015) {
          showError('ACRCloud auth error — check your credentials in Settings.');
        }
        return null;
      }
      const m = data.metadata.music[0];
      console.log('[ACRCloud] raw match:', JSON.stringify(m, null, 2));
      const artist = m.artists?.map(a => a.name).join(', ') || 'Unknown';
      const offsetMs = m.play_offset_ms || 0;
      const mins = Math.floor(offsetMs / 60000);
      const secs = Math.floor((offsetMs % 60000) / 1000);

      const sp = m.external_metadata?.spotify;
      const am = m.external_metadata?.apple_music;
      const deezer = m.external_metadata?.deezer;

      return {
        title: m.title || 'Unknown',
        artist: artist,
        album: m.album?.name || '',
        timecode: mins + ':' + String(secs).padStart(2, '0'),
        song_link: null,
        spotify: sp?.track ? {
          duration_ms: m.duration_ms || null,
          external_urls: { spotify: 'https://open.spotify.com/track/' + sp.track.id },
          album: { images: sp.album?.cover_big ? [{ url: sp.album.cover_big }]
            : sp.album?.cover_medium ? [{ url: sp.album.cover_medium }] : [] }
        } : null,
        apple_music: am ? {
          url: am.url || (am.track?.id ? 'https://music.apple.com/song/' + am.track.id : null),
          durationInMillis: m.duration_ms || null,
          artwork: am.artwork ? { url: am.artwork.url } : null
        } : null,
        _deezerUrl: deezer?.track?.id ? 'https://www.deezer.com/track/' + deezer.track.id : null,
        _coverFallback: m.external_metadata?.deezer?.album?.cover_big
          || m.external_metadata?.deezer?.album?.cover_medium || null
      };
    }

    /* ── Provider: AudD ── */
    async function identifyAudD(audioBlob) {
      const fd = new FormData();
      fd.append('file', audioBlob, 'recording.wav');
      fd.append('api_token', settings.auddToken);
      fd.append('return', 'apple_music,spotify');

      const res = await fetch('https://api.audd.io/', { method: 'POST', body: fd });
      trackRequest('audd');
      const data = await res.json();

      if (data.status === 'success' && data.result) {
        return data.result;
      }
      if (data.status === 'error' && data.error) {
        const code = data.error.error_code;
        if (code === 900 || code === 901) {
          showError('Invalid AudD token — update it in Settings.');
        }
      }
      return null;
    }

    /* ── Core: identify a clip ── */
    async function identify(blob, clipStart) {
      if (isIdentifying) return;
      isIdentifying = true;

      const providerName = settings.provider === 'acrcloud' ? 'ACRCloud' : 'AudD';

      phase('Song detected', curKey
        ? 'Audio captured while ' + curLabel + ' may still be playing'
        : 'A music sample was captured', true, false);

      await new Promise(r => setTimeout(r, 400));
      if (!isListening) { isIdentifying = false; return; }

      phase('Identifying...', curKey
        ? 'Checking if ' + curLabel + ' is still playing'
        : 'Sending audio to ' + providerName, true, true);

      try {
        let audioBlob = blob;
        try { audioBlob = await blobToWav(blob); } catch(_) {}

        if (!settings.acrHost || !settings.acrKey || !settings.acrSecret) {
          showError('Recognition service unavailable.');
          isIdentifying = false;
          phase('Listening for music...', 'Configure ACRCloud in settings', true, false);
          return;
        }

        const r = settings.provider === 'acrcloud'
          ? await identifyACRCloud(audioBlob)
          : await identifyAudD(audioBlob);

        const now = performance.now();

        if (r) {
          showError('');
          missCount = 0;
          const key = r.artist + '::' + r.title;
          const label = r.title + ' — ' + r.artist;
          const tc = parseTimecode(r.timecode);
          const dur = getDuration(r);

          if (!curKey) {
            curKey = key; curLabel = label; curTitle = r.title; curArtist = r.artist;
            curDurationMs = dur; curResult = r;
            curStartedAt = Number.isFinite(tc) ? now - tc : now;
            addHistory(r, '', null);
            showNowPlaying(r, 'Now Playing');
            fetchCoverArt(r);
            phase('Song identified', label, true, false);
            fetchLyrics(r.title, r.artist, r.album, dur);
            if (videoForKey !== key) searchAndPlayVideo(r.title, r.artist, Number.isFinite(tc) ? tc / 1000 : 0);

          } else if (curKey === key || isSameSong(curArtist, curTitle, r.artist, r.title)) {
            curDurationMs = dur || curDurationMs;
            curResult = r;
            if (isPaused) resumeFromPause();
            nowPlaying.classList.remove('paused');
            phase('Still playing', label + ' • at ' + fmtPos(now - curStartedAt), true, false);

          } else {
            const prevLabel = curLabel;
            const prevPlaytime = curStartedAt ? fmtPos(now - curStartedAt) : '';
            if (curResult) addHistory(curResult, 'Played for ~' + prevPlaytime);
            stopProgress();
            clearLyrics();
            curKey = key; curLabel = label; curTitle = r.title; curArtist = r.artist;
            curDurationMs = dur; curResult = r;
            curStartedAt = Number.isFinite(tc) ? now - tc : now;
            addHistory(r, '', null);
            showNowPlaying(r, 'Song Changed');
            fetchCoverArt(r);
            phase('New song detected', prevLabel + ' → ' + label, true, false);
            fetchLyrics(r.title, r.artist, r.album, dur);
            if (videoForKey !== key) searchAndPlayVideo(r.title, r.artist, Number.isFinite(tc) ? tc / 1000 : 0);
          }

          startProgress();
          if (syncedLines.length) startLyrics();
          [resultsList, resultsListDrawer].filter(Boolean).forEach(list => list.querySelectorAll('.no-result').forEach(el => el.remove()));

        } else {
          missCount++;
          if (curKey && missCount >= 1) {
            showPaused();
            phase('Song paused?', curLabel + ' — no audio match detected', true, false);
          } else if (!curKey) {
            phase('Listening for music...', 'No match yet — keep playing', true, false);
          }
        }
      } catch (err) {
        showError('Could not reach ' + providerName + '. Check your internet connection.');
        if (curKey) {
          phase('Still playing', curLabel, true, false);
        } else {
          phase('Listening for music...', 'Waiting for a clear song sample', true, false);
        }
      } finally {
        isIdentifying = false;
      }
    }

    /* ── Recording loop ── */
    function startRecording() {
      if (!audioStream) return;
      function record() {
        if (!isListening || !audioStream) return;
        const clipStart = performance.now();
        mediaRecorder = new MediaRecorder(audioStream, {
          mimeType: 'audio/webm;codecs=opus',
          audioBitsPerSecond: 128000,
        });
        const chunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          if (blob.size > 20000) identify(blob, clipStart);
        };
        mediaRecorder.start();
        setTimeout(() => {
          if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
        }, RECORD_MS);
      }
      record();
      recordLoop = setInterval(record, RECORD_MS + GAP_MS);
    }

    /* ── Start / Stop ── */
    async function startListening() {
      showError('');
      if (vizAnalyserNode && !isListening) {
        if (vizAudioCtx) { vizAudioCtx.close().catch(() => {}); vizAudioCtx = null; }
        vizAnalyserNode = null;
        if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
      }
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
        });
      } catch (e1) {
        try {
          audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e2) {
          showError(e2?.name === 'NotAllowedError'
            ? 'Microphone access denied. Allow it in browser settings and try again.'
            : (e2?.message || 'Could not access the microphone.'));
          phase('Click to start listening', '');
          return;
        }
      }

      isListening = true;
      listeningStartedAt = performance.now();
      curKey = null; curLabel = ''; curStartedAt = 0; curDurationMs = null;
      curResult = null; missCount = 0;
      resetProgress();
      hideNowPlaying();
      phase('Listening for music...', 'Waiting for a clear song sample', true, false);

      vizAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const micSource = vizAudioCtx.createMediaStreamSource(audioStream);
      vizAnalyserNode = vizAudioCtx.createAnalyser();
      vizAnalyserNode.fftSize = 512;
      vizAnalyserNode.smoothingTimeConstant = 0.82;
      micSource.connect(vizAnalyserNode);

      if (settings.bgMode === 'visualizer') startVisualizer();

      startRecording();
    }

    function stopListening() {
      isListening = false;
      if (curResult && curStartedAt) {
        const playtime = fmtPos(performance.now() - curStartedAt);
        addHistory(curResult, 'Played for ~' + playtime);
      }
      curKey = null; curLabel = ''; curStartedAt = 0; curDurationMs = null;
      curResult = null; missCount = 0;
      resetProgress();
      clearLyrics();
      hideNowPlaying();
      destroyVisualizer();
      hideVideo();
      if (vizAudioCtx) { vizAudioCtx.close().catch(() => {}); vizAudioCtx = null; vizAnalyserNode = null; }
      if (recordLoop) { clearInterval(recordLoop); recordLoop = null; }
      if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
      mediaRecorder = null;
      if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
      phase('Click to start listening', '');
    }

    micBtn.addEventListener('click', () => {
      if (isListening) stopListening(); else startListening();
    });

    function openDrawer() {
      resultsDrawer.classList.add('drawer-open');
      drawerOverlay.classList.add('visible');
    }
    function closeDrawer() {
      resultsDrawer.classList.remove('drawer-open');
      drawerOverlay.classList.remove('visible');
    }
    historyToggle.addEventListener('click', () => {
      if (resultsDrawer.classList.contains('drawer-open')) closeDrawer();
      else openDrawer();
    });
    drawerOverlay.addEventListener('click', closeDrawer);

    applyMusicSourceMode();
    if (settings.musicSource === 'spotify' && getSpotifyAccessToken()) startSpotifyPolling();

    loadHistory();

    if (settings.bgMode === 'visualizer') initVisualizerAudioOnly().catch(() => {});

    console.log('[DJ Live] v12 loaded — YouTube + Dailymotion + Visualizer backgrounds');
  </script>
</body>
</html>
